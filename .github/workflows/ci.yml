name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  TEST_DATABASE_URL: postgresql://gymcoach_test:gymcoach_test@localhost:5434/gymcoach_test

jobs:
  quality:
    name: Lint, typecheck, unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test

  integration:
    name: Integration tests (Postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: gymcoach_test
          POSTGRES_PASSWORD: gymcoach_test
          POSTGRES_DB: gymcoach_test
        ports:
          - 5434:5432
        options: >-
          --health-cmd "pg_isready -U gymcoach_test"
          --health-interval 5s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ env.TEST_DATABASE_URL }}
      - run: npm run test:integration

  build:
    name: Production build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npm run build
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/db
          JWT_SECRET: ci-build-placeholder-secret-at-least-32-chars

  e2e:
    name: End to end (Playwright)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: gymcoach_test
          POSTGRES_PASSWORD: gymcoach_test
          POSTGRES_DB: gymcoach_test
        ports:
          - 5434:5432
        options: >-
          --health-cmd "pg_isready -U gymcoach_test"
          --health-interval 5s --health-timeout 5s --health-retries 5
    env:
      DATABASE_URL: ${{ env.TEST_DATABASE_URL }}
      JWT_SECRET: e2e-test-secret-at-least-32-characters
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma migrate deploy
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
