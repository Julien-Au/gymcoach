# Redeploys the public demo instance ON DEMAND. The RELIABLE automatic path is
# a PULL-model cron ON the VPS (auto-deploy.sh every 2h: it git-fetches main and
# self-redeploys when it moved) - GitHub-runner-SSH-IN times out at the
# connection level from shared runner IPs, so this workflow is manual-dispatch
# only now (the weekly schedule was removed - its failures were pure red noise).
# Security model (see issue #123):
# - triggers: manual dispatch ONLY - never PR events, so fork PRs can not reach
#   the secrets.
# - permissions: none on the GitHub token.
# - no third-party actions: plain ssh with a pinned host key.
# - the SSH key is locked server-side to a forced command that runs the
#   deploy script and nothing else (no pty, no forwarding); even a leaked
#   key can only trigger a legitimate redeploy.
# - the deploy script lives ON the VPS, outside this repo: a malicious
#   change to this workflow can not change what executes server-side.
name: Deploy demo

on:
  workflow_dispatch: {}

permissions: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Deploy via locked SSH key
        env:
          SSH_KEY: ${{ secrets.DEMO_DEPLOY_SSH_KEY }}
          KNOWN_HOSTS: ${{ secrets.DEMO_DEPLOY_KNOWN_HOSTS }}
          HOST: ${{ secrets.DEMO_DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEMO_DEPLOY_USER }}
        run: |
          umask 077
          printf '%s\n' "$SSH_KEY" > key
          printf '%s\n' "$KNOWN_HOSTS" > known_hosts
          # The remote forced command ignores whatever is requested and runs
          # the deploy script; "deploy" below is documentation, not control.
          # Runner-to-VPS connects time out transiently (~50% of observed
          # runs), so retry the connection a bounded 3 times. ConnectTimeout
          # keeps each attempt short; a genuine deploy failure (non-timeout)
          # still fails fast on its real exit code.
          attempt=1
          until ssh -i key -o UserKnownHostsFile=known_hosts -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes -o ConnectTimeout=20 \
            "$DEPLOY_USER@$HOST" deploy; do
            code=$?
            if [ "$code" -ne 255 ] || [ "$attempt" -ge 3 ]; then
              echo "deploy failed (exit $code, attempt $attempt)"; rm -f key; exit "$code"
            fi
            echo "ssh connect failed (attempt $attempt), retrying in 30s"
            attempt=$((attempt+1)); sleep 30
          done
          rm -f key
